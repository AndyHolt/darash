services:
  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_DB: ${PGDATABASE}
    ports:
      - "${PGPORT}:5432"
    volumes:
      # Mount at /var/lib/postgresql (not /var/lib/postgresql/data) — the
      # postgres:18+ image stores data in version-specific subdirectories
      # under this root so pg_upgrade --link can work across major versions.
      - darash_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER} -d ${PGDATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    profiles: [backend]
    build:
      context: ../../backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${PGDATABASE}
      DB_USER: ${PGUSER}
      DB_PASSWORD: ${PGPASSWORD}
      DB_SSLMODE: disable
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  darash_pgdata:
