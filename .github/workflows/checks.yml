name: Checks

on:
  push:

jobs:
  checks:
    name: Repo checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install prek
        uses: taiki-e/install-action@v2
        with:
          tool: prek

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Set up uv for dev tool access
        uses: astral-sh/setup-uv@v5

      - name: Install ingest Python dev dependencies
        working-directory: ingest
        run: uv sync --dev

      - name: Run checks
        run: prek . --all-files --skip no-commit-to-branch
