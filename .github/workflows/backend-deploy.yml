name: Backend deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: darash-backend
  ECS_CLUSTER: darash-backend
  ECS_SERVICE: darash-backend
  TASK_FAMILY: darash-backend
  CONTAINER_NAME: darash-backend
  LAMBDA_FUNCTION: darash-backend

jobs:
  deploy:
    name: Build image and deploy to ECS
    runs-on: ubuntu-latest

    # Throwaway Postgres so `ingest` can run its unchanged pg load; it is
    # discarded when the job ends. The image is baked from the SQLite file the
    # same run also emits (DATA_SQLITE_PATH below), not from this database.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: darash
          POSTGRES_PASSWORD: darash
          POSTGRES_DB: darash
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          role-to-assume: ${{ secrets.AWS_BACKEND_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install ingest dependencies
        working-directory: ingest
        run: uv sync

      # Build data.sqlite into the Docker build context (backend/) so the image
      # below bakes it in. The pg load runs against the throwaway service
      # container; only the SQLite file is kept.
      - name: Build data.sqlite
        working-directory: ingest
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: darash
          PGPASSWORD: darash
          PGDATABASE: darash
          DATA_SQLITE_PATH: ${{ github.workspace }}/backend/data.sqlite
        run: PYTHONPATH=src uv run python main.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          # Lambda's CreateFunction rejects a manifest list / OCI image index.
          # build-push-action attaches a provenance attestation by default,
          # which wraps even a single-platform push in an index; disable it so
          # the pushed tag is a plain image manifest Lambda accepts. (SBOM
          # attestations are off by default, so no flag needed for those.)
          provenance: false
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Point the Lambda at the image this run just pushed, pinning the digest
      # so the deploy is immutable (the function's Terraform ignore_changes on
      # image_uri expects CI to own the running digest). Runs alongside the ECS
      # deploy below until the old stack is torn down.
      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name "${LAMBDA_FUNCTION}" \
            --image-uri "${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}@${{ steps.build.outputs.digest }}" \
            > /dev/null
          aws lambda wait function-updated \
            --function-name "${LAMBDA_FUNCTION}"

      - name: Fetch current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${TASK_FAMILY}" \
            --query 'taskDefinition' \
            > task-definition.json

      - name: Render new task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}@${{ steps.build.outputs.digest }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
