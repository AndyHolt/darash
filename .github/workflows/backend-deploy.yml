name: Backend deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: darash-backend
  LAMBDA_FUNCTION: darash-backend

jobs:
  deploy:
    name: Build image and deploy to Lambda
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          role-to-assume: ${{ secrets.AWS_BACKEND_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install ingest dependencies
        working-directory: ingest
        run: uv sync

      # Build data.sqlite into the Docker build context (backend/) so the image
      # below bakes it in.
      - name: Build data.sqlite
        working-directory: ingest
        env:
          DATA_SQLITE_PATH: ${{ github.workspace }}/backend/data.sqlite
        run: PYTHONPATH=src uv run python main.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: backend
          platforms: linux/arm64
          push: true
          # Lambda's CreateFunction rejects a manifest list / OCI image index.
          # build-push-action attaches a provenance attestation by default,
          # which wraps even a single-platform push in an index; disable it so
          # the pushed tag is a plain image manifest Lambda accepts. (SBOM
          # attestations are off by default, so no flag needed for those.)
          provenance: false
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Point the Lambda at the image this run just pushed, pinning the digest
      # so the deploy is immutable (the function's Terraform ignore_changes on
      # image_uri expects CI to own the running digest).
      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name "${LAMBDA_FUNCTION}" \
            --image-uri "${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}@${{ steps.build.outputs.digest }}" \
            > /dev/null
          aws lambda wait function-updated \
            --function-name "${LAMBDA_FUNCTION}"
