repos:
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        language: system
        entry: gofmt -s -w
        types: [go]

      - id: go-vet
        name: go vet
        language: system
        entry: go vet ./...
        types: [go]
        pass_filenames: false

      - id: go-mod-tidy
        name: go mod tidy
        language: system
        entry: go mod tidy
        files: \.go$|^go\.(mod|sum)$
        pass_filenames: false

      - id: golangci-lint
        name: golangci-lint
        language: system
        entry: golangci-lint run
        types: [go]
        pass_filenames: false
